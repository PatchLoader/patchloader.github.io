<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patch Loader</title>
<style>
body { margin: 0; padding: 0; overflow: hidden; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
canvas { position: absolute; top: 0; left: 0; z-index: 1; }
.container { position: relative; z-index: 2; text-align: center; background: rgba(15, 15, 20, 0.85); padding: 40px; border-radius: 16px; box-shadow: 0 0 30px rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
h1 { font-size: 26px; margin: 0 0 10px 0; font-weight: 600; }
p { font-size: 18px; margin: 0 0 30px 0; color: #b0b0b0; }
a.btn { display: inline-block; padding: 14px 35px; background: #ffffff; color: #000000; text-decoration: none; border-radius: 30px; font-weight: bold; font-size: 16px; transition: all 0.3s ease; }
a.btn:hover { background: #e0e0e0; box-shadow: 0 0 20px rgba(255, 255, 255, 0.4); transform: translateY(-3px); }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="container">
<h1>Patch Loader закрыт.</h1>
<p>Больше он не будет распространяться.</p>
<a href="https://t.me/codeverse_official" class="btn" target="_blank">Подробнее</a>
</div>
<script>
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;
const stars = [];
for (let i = 0; i < 350; i++) {
stars.push({ x: Math.random() * w, y: Math.random() * h, r: Math.random() * 1.5, s: Math.random() * 0.5 + 0.1 });
}
function animate() {
ctx.clearRect(0, 0, w, h);
ctx.fillStyle = '#ffffff';
stars.forEach(star => {
ctx.beginPath();
ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
ctx.fill();
star.y -= star.s;
if (star.y < 0) {
star.y = h;
star.x = Math.random() * w;
}
});
requestAnimationFrame(animate);
}
animate();
window.addEventListener('resize', () => {
w = canvas.width = window.innerWidth;
h = canvas.height = window.innerHeight;
});
</script>
</body>
</html>
